<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미러 기프트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <h1 class="site-title">미러 기프트</h1>

      <button class="menu-btn" onclick="setFilter('전체')">전체</button>
      <button class="menu-btn burn-btn" onclick="setFilter('화상')">화상</button>
      <button class="menu-btn bleed-btn" onclick="setFilter('출혈')">출혈</button>
      <button class="menu-btn ex-btn" onclick="setFilter('EX')">EX</button>
    </div>

    <div class="auth-panel">
      <button class="auth-btn" id="login-open-btn" onclick="openLoginModal()">로그인</button>
      <button class="auth-btn" id="signup-open-btn" onclick="openSignupModal()">회원가입</button>
      <button class="auth-btn logout-btn" id="logout-btn" onclick="logout()" style="display:none;">
        로그아웃
      </button>
      <div id="auth-status" class="auth-status">비로그인 상태</div>
    </div>
  </div>

  <main class="main-layout">
    <section class="gift-section">
      <div class="section-header">
        <h2>기프트 목록</h2>

        <div class="grade-filter">
          <button class="grade-btn" data-grade="1" onclick="toggleGradeFilter(1)">I</button>
          <button class="grade-btn" data-grade="2" onclick="toggleGradeFilter(2)">II</button>
          <button class="grade-btn" data-grade="3" onclick="toggleGradeFilter(3)">III</button>
          <button class="grade-btn" data-grade="4" onclick="toggleGradeFilter(4)">IV</button>
          <button class="grade-btn" data-grade="5" onclick="toggleGradeFilter(5)">V</button>
        </div>
      </div>

      <div id="gift-list" class="gift-list"></div>
    </section>

    <aside class="admin-section" id="admin-section" style="display:none;">
      <h2>관리자 기능</h2>

      <div class="admin-form">
        <label>문서 ID (수정/삭제용)</label>
        <input type="text" id="gift-id" placeholder="예: burn_01" />

        <label>기프트 이름</label>
        <input type="text" id="gift-name" placeholder="예: 융해된 파라핀" />

        <label>키워드</label>
        <select id="gift-keyword">
          <option value="">선택</option>
          <option value="화상">화상</option>
          <option value="출혈">출혈</option>
          <option value="EX">EX</option>
        </select>

        <label>등급</label>
        <input type="number" id="gift-grade" placeholder="예: 1" min="0" max="5" />

        <label>이미지 경로</label>
        <input
          type="text"
          id="gift-img"
          placeholder="예: images/burn/융해된파라핀.png"
          oninput="updatePreview()"
        />

        <div class="preview-wrap">
          <div class="gift-icon-wrap preview-icon-wrap">
            <img src="images/frame.png" class="gift-frame" alt="프레임" />
            <img id="preview-img" class="gift-icon" style="display:none;" alt="미리보기" />
          </div>
        </div>

        <div class="admin-buttons">
          <button class="save-btn" onclick="addGift()">추가</button>
          <button class="edit-btn" onclick="updateGift()">수정</button>
          <button class="delete-btn" onclick="deleteGift()">삭제</button>
          <button class="reset-btn" onclick="clearAdminForm()">입력 초기화</button>
        </div>

        <div class="bulk-add-wrap">
          <label>일괄 추가</label>
          <textarea
            id="bulk-json"
            rows="10"
            placeholder="한 줄에 하나씩 입력&#10;예:&#10;burn_01 | 융해된 파라핀 | 화상 | 1 | images/burn/융해된파라핀.png"
          ></textarea>

          <div class="bulk-buttons">
            <button class="save-btn" onclick="bulkAddGifts()">일괄 추가</button>
            <button class="reset-btn" onclick="clearBulkJson()">입력 비우기</button>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <div id="login-modal" class="modal" style="display:none;">
    <div class="modal-box">
      <h3>로그인</h3>
      <input type="text" id="login-id" placeholder="아이디" />
      <input type="password" id="login-password" placeholder="비밀번호" />

      <div class="modal-buttons">
        <button onclick="login()">로그인</button>
        <button onclick="closeLoginModal()">닫기</button>
      </div>
    </div>
  </div>

  <div id="signup-modal" class="modal" style="display:none;">
    <div class="modal-box">
      <h3>회원가입</h3>
      <input type="text" id="signup-id" placeholder="아이디" />
      <input type="text" id="signup-nickname" placeholder="닉네임" />
      <input type="password" id="signup-password" placeholder="비밀번호" />
      <input type="password" id="signup-password-confirm" placeholder="비밀번호 확인" />

      <div class="modal-buttons">
        <button onclick="signup()">회원가입</button>
        <button onclick="closeSignupModal()">닫기</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      updateDoc,
      deleteDoc,
      doc,
      setDoc,
      getDoc,
      query,
      where,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAx0HcriIiQAk5txhrsTO4k7iwrOVhqSMA",
      authDomain: "mirrorgift-hsp43.firebaseapp.com",
      projectId: "mirrorgift-hsp43",
      storageBucket: "mirrorgift-hsp43.firebasestorage.app",
      messagingSenderId: "521946888140",
      appId: "1:521946888140:web:8fdfcef490b7f4bf7d0f69"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.db = db;
    window.auth = auth;
    window.fb = {
      collection,
      getDocs,
      updateDoc,
      deleteDoc,
      doc,
      setDoc,
      getDoc,
      query,
      where,
      limit,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut
    };

    window.firebaseReady = true;
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  <script src="script.js"></script>
</body>
</html>
